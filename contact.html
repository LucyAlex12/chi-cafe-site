<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Chi Café</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/layout.css">
  <script defer src="js/main.js"></script>
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="logo">Chi Café</a>
    <button id="menu-btn" aria-label="Toggle menu">☰</button>
    <ul class="nav-menu" id="nav-menu">
      <li><a href="about.html">About</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </header>

  <main>
    <section class="hero-small container" style="background-image:url('images/contact-hero.jpg')">
      <h1>Contact Us</h1>
    </section>

    <section class="container">
      <form id="contactForm" class="contact-form">
        <label>Name<input type="text" name="name" required></label>
        <label>Email<input type="email" name="email" required></label>
        <label>Message<textarea name="message" required></textarea></label>
        <button type="submit" class="btn">Send Message</button>
        <div id="formMessage" role="alert"></div>
      </form>

      <div class="map-wrapper" style="margin-top:2rem;">
        <h2>Visit Our Café</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!..." width="100%" height="300" style="border:0;" loading="lazy"></iframe>
      </div>
    </section>
  </main>

  <footer class="container">
    <p>&copy; 2025 Chi Café</p>
  </footer>
</body>
</html>
