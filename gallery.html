<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Chi Cafe</title>
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/main.js"></script>
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="logo">Chi Cafe</a>
    <button id="menu-btn" class="icon-btn" aria-label="Toggle menu">Menu</button>
    <nav class="nav-menu" id="nav-menu" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="gallery.html">Gallery</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <p class="eyebrow">Visual menu</p>
      <h1>Tap a moment.</h1>
      <p>Open the gallery cards to preview Chi Cafe drinks, desserts, and community spaces.</p>
    </section>

    <section class="section gallery-grid" id="galleryGrid">
      <button data-src="images/images/gallery-1.jpg" data-caption="Morning counter service">
        <img src="images/images/gallery-1.jpg" alt="Cafe counter">
      </button>
      <button data-src="images/images/gallery-2.jpg" data-caption="Friends and fresh coffee">
        <img src="images/images/gallery-2.jpg" alt="Friends at cafe">
      </button>
      <button data-src="images/images/gallery-3.jpg" data-caption="Pastry shelf favorites">
        <img src="images/images/gallery-3.jpg" alt="Pastries">
      </button>
      <button data-src="images/images/gallery-4.jpg" data-caption="Warm corner seating">
        <img src="images/images/gallery-4.jpg" alt="Cafe seating">
      </button>
      <button data-src="images/images/gallery-5.jpg" data-caption="Latte art lab">
        <img src="images/images/gallery-5.jpg" alt="Latte art">
      </button>
      <button data-src="images/images/gallery-6.jpg" data-caption="Weekend event table">
        <img src="images/images/gallery-6.jpg" alt="Cafe event">
      </button>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button id="closeLightbox" aria-label="Close gallery preview">Close</button>
    <img id="lightboxImg" alt="">
    <p id="lightboxCaption"></p>
  </div>

  <footer>
    <p>Chi Cafe - every cup has a scene.</p>
  </footer>
</body>
</html>
